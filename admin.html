<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Bokningar</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Admin - Al-Ghazal Al-Asmar Städservice</h1>
</header>

<main>

<h2>Alla bokningar</h2>

<table border="1">
  <thead>
    <tr>
      <th>Namn</th>
      <th>Email</th>
      <th>Datum</th>
    </tr>
  </thead>
  <tbody id="bookingTable">
  </tbody>
</table>

</main>

<script>
fetch("/bookings")
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById("bookingTable");

    data.forEach(b => {
      const row = `
        <tr>
          <td>${b.name}</td>
          <td>${b.email}</td>
          <td>${b.date}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  });
</script>

</body>
</html>
